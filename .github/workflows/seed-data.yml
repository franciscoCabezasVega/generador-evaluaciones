name: Seed Random Data

on:
  schedule:
    # Every Saturday at 15:00 UTC = 10:00 AM Colombia (COT, UTC-5)
    - cron: '0 15 * * 6'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Optional reason for manual run'
        required: false
        default: 'Manual seed'

defaults:
  run:
    working-directory: app

jobs:
  seed:
    if: false # Temporalmente desactivado
    name: Generate random seed data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run seed script
        run: node --import tsx ./scripts/seed-random-data.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
